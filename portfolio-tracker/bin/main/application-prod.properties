# Production profile configuration
# IMPORTANT: The following environment variables MUST be set before deployment:
# - APP_JWT_SECRET: A strong, randomly generated JWT signing secret (min 32 characters)
# - SPRING_DATASOURCE_URL: PostgreSQL connection URL
# - SPRING_DATASOURCE_USERNAME: PostgreSQL username
# - SPRING_DATASOURCE_PASSWORD: PostgreSQL password
# - SPRING_JPA_HIBERNATE_DDL_AUTO: Should be 'validate' or 'update' (never 'create-drop')

# If any required environment variable is missing, the application will fail to start
# This is intentional - it ensures no accidental misconfigurations reach production

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

