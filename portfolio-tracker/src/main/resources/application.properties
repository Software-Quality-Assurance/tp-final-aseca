spring.application.name=portfolio-tracker

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/portfolio_tracker?options=-c%20TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:portfolio_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portfolio_pass}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:portfolio-tracker-dev-secret}
app.jwt.issuer=${APP_JWT_ISSUER:portfolio-tracker}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

