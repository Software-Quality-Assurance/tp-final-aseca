spring.application.name=portfolio-tracker

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/portfolio_tracker?options=-c%20TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:portfolio_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portfolio_pass}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.issuer=${APP_JWT_ISSUER:portfolio-tracker}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

app.edgar.user-agent=${SEC_EDGAR_USER_AGENT:tp-final-aseca fmanfredi@mail.austral.edu.ar}
app.edgar.data-base-url=${SEC_EDGAR_DATA_BASE_URL:https://data.sec.gov}
app.edgar.sec-base-url=${SEC_EDGAR_SEC_BASE_URL:https://www.sec.gov}
app.edgar.efts-base-url=${SEC_EDGAR_EFTS_BASE_URL:https://efts.sec.gov}
app.edgar.timeout-seconds=${SEC_EDGAR_TIMEOUT_SECONDS:15}
