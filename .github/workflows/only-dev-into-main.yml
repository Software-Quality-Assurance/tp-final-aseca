name: Allow merge to main only from dev

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    name: validate source branch for main
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "Base branch: ${BASE_BRANCH}"
          echo "Head branch: ${HEAD_BRANCH}"

          if [ "${HEAD_BRANCH}" != "dev" ]; then
            echo "::error title=Invalid source branch::Pull requests targeting main must come from dev. Received '${HEAD_BRANCH}' -> '${BASE_BRANCH}'."
            exit 1
          fi

          echo "Branch policy satisfied: dev -> main"
