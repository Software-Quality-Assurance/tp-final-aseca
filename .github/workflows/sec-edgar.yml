name: SEC EDGAR integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "portfolio-tracker/src/main/kotlin/com/austral/portfolio_tracker/edgar/**"
      - "portfolio-tracker/src/test/kotlin/com/austral/portfolio_tracker/edgar/**"
      - ".github/workflows/sec-edgar.yml"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run SEC EDGAR unit and backend E2E tests
        run: ./gradlew :portfolio-tracker:test --tests "com.austral.portfolio_tracker.edgar.*"

      - name: Run real SEC EDGAR integration test
        if: github.event_name == 'workflow_dispatch'
        env:
          RUN_LIVE_SEC_EDGAR_TESTS: "1"
          SEC_EDGAR_USER_AGENT: "tp-final-aseca fmanfredi@mail.austral.edu.ar"
        run: ./gradlew :portfolio-tracker:test --tests "com.austral.portfolio_tracker.edgar.SecEdgarLiveIntegrationTests" --rerun-tasks
