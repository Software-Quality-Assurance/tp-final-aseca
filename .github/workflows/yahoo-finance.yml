name: Yahoo Finance integration

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "yahoo-finance/**"
      - "portfolio-tracker/src/main/kotlin/com/austral/portfolio_tracker/entities/Price.kt"
      - "docker-compose.yml"
      - ".github/workflows/yahoo-finance.yml"
  workflow_dispatch:
    inputs:
      run_live_yahoo:
        description: "Run the real Yahoo Finance integration test"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio_tracker_test
          POSTGRES_USER: portfolio_user
          POSTGRES_PASSWORD: portfolio_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio_user -d portfolio_tracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: yahoo-finance/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e "./yahoo-finance[test]"

      - name: Run unit and PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql://portfolio_user:portfolio_pass@localhost:5432/portfolio_tracker_test
        run: python -m pytest yahoo-finance/tests -m "not live"

      - name: Run real Yahoo Finance integration test
        if: github.event_name == 'workflow_dispatch' && inputs.run_live_yahoo
        env:
          RUN_LIVE_YAHOO_TESTS: "1"
          TEST_DATABASE_URL: postgresql://portfolio_user:portfolio_pass@localhost:5432/portfolio_tracker_test
        run: python -m pytest yahoo-finance/tests -m live
